<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SEA Leaders | Coastal Insights</title>
    <style>
      :root {
        color-scheme: dark;
        --me-primary: #1fa6a3;
        --me-primary-strong: #167c88;
        --me-accent: #8fd3f4;
        --me-bg: #0f2233;
        --me-bg-2: #0b1e2d;
        --me-surface-top: #17354d;
        --me-surface-bottom: #122f45;
        --me-border: rgba(124, 200, 220, 0.2);
        --me-text: #f2f6f8;
        --me-muted: #9fb3c2;
        --me-radius: 14px;
        --me-shadow: 0 16px 36px rgba(0, 0, 0, 0.32);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: linear-gradient(180deg, var(--me-bg) 0%, var(--me-bg-2) 100%);
        color: var(--me-text);
        font-family: Inter, "Segoe UI", Calibri, Arial, Helvetica, sans-serif;
      }
      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px 18px 32px;
      }
      .page-head {
        border: 1px solid var(--me-border);
        border-radius: var(--me-radius);
        padding: 20px;
        background: linear-gradient(180deg, var(--me-surface-top) 0%, var(--me-surface-bottom) 100%);
        box-shadow: var(--me-shadow);
      }
      .eyebrow {
        color: var(--me-muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 8px 0 8px;
        font-size: clamp(1.5rem, 3vw, 2rem);
      }
      .subtitle {
        margin: 0;
        color: var(--me-muted);
      }
      #app-root {
        padding: 16px 0 28px;
        display: grid;
        gap: 18px;
      }
      .panel,
      .sector-block {
        border: 1px solid var(--me-border);
        border-radius: var(--me-radius);
        padding: 16px;
        background: linear-gradient(180deg, var(--me-surface-top) 0%, var(--me-surface-bottom) 100%);
        box-shadow: var(--me-shadow);
      }
      .panel h3,
      .sector-block h3 {
        margin: 0 0 8px;
        font-size: clamp(1.05rem, 2vw, 1.25rem);
      }
      .panel-sub {
        margin: 0;
        color: var(--me-muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }
      .top-row {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .exec-row {
        border: 1px solid var(--me-border);
        border-radius: 10px;
        padding: 10px;
        margin-top: 10px;
        background: linear-gradient(180deg, rgba(25, 57, 83, 0.95) 0%, rgba(17, 43, 64, 0.95) 100%);
      }
      .exec-label {
        font-size: 12px;
        color: var(--me-muted);
        margin-bottom: 6px;
      }
      .exec-text {
        margin: 0;
        line-height: 1.45;
      }
      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .filter-btn {
        border: 1px solid var(--me-border);
        background: rgba(46, 125, 175, 0.18);
        color: var(--me-accent);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .filter-btn.active {
        background: linear-gradient(180deg, var(--me-primary) 0%, var(--me-primary-strong) 100%);
        color: #fff;
      }
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }
      .section-meta {
        color: var(--me-muted);
        font-size: 12px;
      }
      .sector-synth {
        margin: 0 0 12px;
        color: var(--me-muted);
        line-height: 1.45;
      }
      .pill {
        display: inline-block;
        border: 1px solid var(--me-border);
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(46, 125, 175, 0.22);
        font-size: 12px;
        color: var(--me-accent);
      }
      .metric-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .metric-card {
        border: 1px solid var(--me-border);
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(180deg, rgba(23, 53, 77, 0.96) 0%, rgba(18, 47, 69, 0.96) 100%);
      }
      .metric-label {
        font-size: 12px;
        color: var(--me-muted);
      }
      .metric-value {
        margin-top: 6px;
        font-weight: 700;
        font-size: 1.25rem;
      }
      .items-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .item-card {
        border: 1px solid var(--me-border);
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(180deg, rgba(23, 53, 77, 0.96) 0%, rgba(18, 47, 69, 0.96) 100%);
      }
      .item-card h5 {
        margin: 0;
        line-height: 1.3;
        font-size: 1rem;
      }
      .story-oneliner {
        margin: 8px 0 0;
        color: var(--me-text);
        font-size: 0.88rem;
      }
      .item-meta {
        margin: 8px 0;
        color: var(--me-muted);
        font-size: 12px;
      }
      .item-desc {
        margin: 0;
        line-height: 1.45;
        color: var(--me-text);
      }
      .item-why {
        margin: 10px 0 0;
        color: var(--me-accent);
        font-size: 12px;
        line-height: 1.45;
      }
      .bottom-row {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .source-list {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      .source-list li {
        margin: 6px 0;
        color: var(--me-text);
      }
      .docs ul {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .footer-note {
        font-size: 12px;
        color: var(--me-muted);
        margin: 0;
      }
      a {
        color: var(--me-accent);
      }
      a:hover {
        color: #c8ebff;
      }
      .error {
        color: #fb7185;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="page-head">
        <div class="eyebrow">SEA Leaders · Coastal Intelligence</div>
        <h1>PartnerAI: Southeast Asia Coastal Insights</h1>
        <p class="subtitle">Sustainable Fisheries · Climate Change · Maritime Security · Sustainable Blue Economy · Marine Pollution</p>
      </section>
      <div id="app-root" class="sea-app">Loading intelligence dashboard…</div>
    </main>
    <script>
      const CATEGORY_ORDER = [
        "Sustainable Fisheries",
        "Climate Change",
        "Maritime Security",
        "Sustainable Blue Economy",
        "Marine Pollution",
      ];
      const FILTERS = ["all", "regional", "local"];
      let activeSourceFilter = "all";
      let cachedPayload = null;

      function esc(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => (
          { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char] || char
        ));
      }

      function normalizePayload(raw) {
        if (Array.isArray(raw.sectors)) {
          return {
            runAt: raw.runAt || raw.generated_at || "",
            sectors: raw.sectors.map((sector) => ({
              name: sector.name,
              items: Array.isArray(sector.items) ? sector.items : [],
            })),
          };
        }

        if (raw.by_category && typeof raw.by_category === "object") {
          const sectors = Object.entries(raw.by_category).map(([name, items]) => ({
            name,
            items: Array.isArray(items) ? items : [],
          }));
          return {
            runAt: raw.runAt || raw.generated_at || "",
            sectors,
          };
        }

        return { runAt: "", sectors: [] };
      }

      function formatDate(raw) {
        const value = String(raw || "").trim();
        if (!value) return "";
        const parsed = Date.parse(value);
        if (!Number.isFinite(parsed)) return value;
        return new Date(parsed).toLocaleString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function flattenItems(sectors) {
        return (sectors || []).flatMap((sector) =>
          (sector.items || []).map((item) => ({ ...item, sectorName: sector.name || "Unknown" }))
        );
      }

      function classifySource(sourceName) {
        const value = String(sourceName || "").toLowerCase();
        const localMarkers = [
          "vietnam",
          "thailand",
          "philippines",
          "indonesia",
          "malaysia",
          "myanmar",
          "cambodia",
          "singapore",
          "brunei",
          "ttxvn",
        ];

        if (localMarkers.some((marker) => value.includes(marker))) return "local";
        return "regional";
      }

      function cleanPublisherLabel(raw) {
        const value = String(raw || "").replace(/\s+/g, " ").trim();
        if (!value) return "";
        return value.replace(/^Google\s+News\s*[:\-]?\s*/i, "").trim();
      }

      function splitTitlePublisher(rawTitle) {
        const value = String(rawTitle || "").replace(/\s+/g, " ").trim();
        if (!value) return { title: "", publisher: "" };
        const parts = value.split(/\s+-\s+/).map((part) => part.trim()).filter(Boolean);
        if (parts.length >= 2) {
          const candidate = cleanPublisherLabel(parts[parts.length - 1]);
          if (candidate && candidate.length <= 80) {
            return {
              title: parts.slice(0, -1).join(" - ").trim(),
              publisher: candidate,
            };
          }
        }
        return { title: value, publisher: "" };
      }

      function displaySource(item) {
        const publisher = cleanPublisherLabel(item.publisher || "");
        if (publisher) return publisher;

        const split = splitTitlePublisher(item.title || "");
        if (split.publisher) return split.publisher;

        const source = String(item.source || "").trim();
        if (/^google\s+news/i.test(source)) return "Google News";
        return source || "Unknown source";
      }

      function sortByDateDesc(items) {
        return [...items].sort((left, right) => {
          const leftDate = Date.parse(left.sourcePublishedAt || left.publishedAt || left.published || "");
          const rightDate = Date.parse(right.sourcePublishedAt || right.publishedAt || right.published || "");
          const leftScore = Number.isFinite(leftDate) ? leftDate : 0;
          const rightScore = Number.isFinite(rightDate) ? rightDate : 0;
          return rightScore - leftScore;
        });
      }

      function pickTopSources(items, max = 5) {
        const counts = new Map();
        items.forEach((item) => {
          const source = displaySource(item);
          counts.set(source, (counts.get(source) || 0) + 1);
        });
        return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, max);
      }

      function synthWhy(item) {
        const text = `${item.title || ""} ${item.snippet || ""}`.toLowerCase();
        if (/(risk|threat|decline|erosion|pollution|dispute|piracy)/.test(text)) {
          return "Why it matters: this highlights a near-term risk signal for coastal communities and policy response.";
        }
        if (/(cooperation|launch|fund|investment|support|strategy|roadmap)/.test(text)) {
          return "Why it matters: this points to implementation momentum and potential partnership opportunities.";
        }
        return "Why it matters: this is a relevant directional update for monitoring sector-level coastal trends.";
      }

      function buildStorySubtext(item) {
        const cleanedSnippet = String(item.snippet || "").replace(/\s+/g, " ").trim();
        const rawTitle = String(item.title || "").replace(/\s+/g, " ").trim();
        const split = splitTitlePublisher(rawTitle);
        const cleanTitle = split.title || rawTitle;
        const source = displaySource(item).toLowerCase();

        if (cleanedSnippet) {
          const snippetWords = cleanedSnippet.split(/\s+/).filter(Boolean).length;
          const normalizedSnippet = cleanedSnippet.toLowerCase().replace(/\W+/g, "");
          const normalizedTitle = cleanTitle.toLowerCase().replace(/\W+/g, "");
          if (
            snippetWords >= 5 &&
            cleanedSnippet.length >= 36 &&
            normalizedSnippet &&
            normalizedSnippet !== normalizedTitle &&
            cleanedSnippet.toLowerCase() !== source
          ) {
            const sentence = cleanedSnippet.split(/(?<=[.!?])\s+/)[0] || cleanedSnippet;
            return sentence.length > 200 ? sentence.slice(0, 199).trimEnd() + "…" : sentence;
          }
        }

        if (cleanTitle.includes(":")) {
          const tail = cleanTitle.split(":").slice(1).join(":").trim();
          if (tail) return tail;
        }

        const words = cleanTitle.split(/\s+/).filter(Boolean);
        if (words.length > 12) {
          return words.slice(6, 18).join(" ").replace(/[,.]$/, "") + "…";
        }

        return cleanTitle;
      }

      function buildCardSnippet(item) {
        const cleanedSnippet = String(item.snippet || "").replace(/\s+/g, " ").trim();
        const source = displaySource(item).toLowerCase();
        if (!cleanedSnippet || cleanedSnippet.length < 48) return "";
        if (cleanedSnippet.toLowerCase() === source) return "";
        const sentence = cleanedSnippet.split(/(?<=[.!?])\s+/)[0] || cleanedSnippet;
        return sentence.length > 240 ? sentence.slice(0, 239).trimEnd() + "…" : sentence;
      }

      function synthSectorSummary(name, items) {
        if (!items.length) return "No current stories for this sector under the selected filter.";
        const newest = sortByDateDesc(items)[0];
        const newestDate = formatDate(newest.sourcePublishedAt || newest.publishedAt || newest.published || "");
        return `${items.length} tracked stories. Latest signal${newestDate ? ` (${newestDate})` : ""}: ${newest.title || "Untitled"}.`;
      }

      function renderExecutiveBrief(items, lastUpdated) {
        const topThree = sortByDateDesc(items).slice(0, 3);
        const rows = topThree.map((item, index) => `
          <article class="exec-row">
            <div class="exec-label">Priority Signal ${index + 1}</div>
            <p class="exec-text">${esc(item.title || "Untitled")}</p>
          </article>
        `).join("");

        return `
          <section class="panel exec-card">
            <div class="section-head">
              <h3>Executive Rapid Brief</h3>
              <span class="section-meta">Updated: ${esc(lastUpdated || "Pending")}</span>
            </div>
            <p class="panel-sub">Top cross-sector signals for Southeast Asia coastal leaders, aligned to the five priority topics.</p>
            ${rows || "<article class=\"exec-row\"><p class=\"exec-text\">No items available to summarize yet.</p></article>"}
          </section>
        `;
      }

      function renderControls(counts) {
        return `
          <section class="top-row">
            <article class="panel">
              <h3>Topic Coverage</h3>
              <div class="pill-row">
                ${counts.map((row) => `<span class="pill">${esc(row.name)}: ${esc(row.count)}</span>`).join("")}
              </div>
            </article>
            <article class="panel">
              <h3>Display Controls</h3>
              <p class="panel-sub">Filter stories by source class, similar to VZLA dashboard controls.</p>
              <div class="filter-row" aria-label="Source filter">
                <button class="filter-btn ${activeSourceFilter === "all" ? "active" : ""}" data-filter="all" type="button">All Sources</button>
                <button class="filter-btn ${activeSourceFilter === "regional" ? "active" : ""}" data-filter="regional" type="button">Regional</button>
                <button class="filter-btn ${activeSourceFilter === "local" ? "active" : ""}" data-filter="local" type="button">Local</button>
              </div>
            </article>
          </section>
        `;
      }

      function renderBottomPanels(lastUpdated, topSources, uniqueSourceCount) {
        return `
          <section class="bottom-row">
            <section class="panel">
              <h3>Coverage Metadata</h3>
              <p class="footer-note">Updated: ${esc(lastUpdated || "Pending")}</p>
              <p class="footer-note">Unique sources tracked: ${esc(uniqueSourceCount)}</p>
              <ul class="source-list">
                ${topSources.map(([name, count]) => `<li>${esc(name)} · ${esc(count)} stories</li>`).join("")}
              </ul>
            </section>
            <section class="panel docs">
              <h3>Migration Documentation</h3>
              <ul>
                <li><a href="../SEASIA_COASTAL_MIGRATION_GUIDE.md">SEASIA Coastal Migration Guide</a></li>
                <li><a href="../SEASIA_COASTAL_QUICK_START.md">SEASIA Coastal Quick Start</a></li>
                <li><a href="../IMPLEMENTATION_CHECKLIST.md">Implementation Checklist</a></li>
                <li><a href="../COMPONENT_MAPPING.md">Component Mapping</a></li>
                <li><a href="../FILE_MANIFEST.md">File Manifest</a></li>
              </ul>
            </section>
          </section>
        `;
      }

      function filterItemsBySource(items) {
        if (activeSourceFilter === "all") return items;
        return items.filter((item) => classifySource(item.source || item.publisher) === activeSourceFilter);
      }

      function render(data) {
        const root = document.getElementById("app-root");
        cachedPayload = data;
        const sectorsByName = Object.fromEntries((data.sectors || []).map((sector) => [sector.name, sector.items || []]));
        const allItems = flattenItems(data.sectors || []);
        const filteredAllItems = filterItemsBySource(allItems);
        const uniqueSources = new Set(
          filteredAllItems
            .map((item) => displaySource(item))
            .filter(Boolean)
        );
        const counts = CATEGORY_ORDER.map((name) => {
          const filtered = filterItemsBySource(sectorsByName[name] || []);
          return { name, count: filtered.length };
        });
        const totalStories = counts.reduce((sum, row) => sum + row.count, 0);
        const lastUpdated = formatDate(data.runAt);
        const topSources = pickTopSources(filteredAllItems);

        const summaryCard = `
          <section class="panel">
            <h3>Coverage Summary</h3>
            <div class="metric-grid">
              <div class="metric-card"><div class="metric-label">Total Stories</div><div class="metric-value">${esc(totalStories)}</div></div>
              <div class="metric-card"><div class="metric-label">Topics Covered</div><div class="metric-value">5</div></div>
              <div class="metric-card"><div class="metric-label">Last Refresh</div><div class="metric-value">${esc(lastUpdated || "Pending")}</div></div>
            </div>
          </section>
        `;

        const sectorsHtml = CATEGORY_ORDER.map((name) => {
          const items = filterItemsBySource(sectorsByName[name] || []);
          const sectorSummary = synthSectorSummary(name, items);
          const cards = items.length
            ? items.slice(0, 8).map((item) => {
              const normalizedTitle = splitTitlePublisher(item.title || "").title || (item.title || "Untitled");
              const source = displaySource(item);
              const date = formatDate(item.sourcePublishedAt || item.publishedAt || item.published || "");
              const clipped = buildCardSnippet(item);
              const oneLiner = buildStorySubtext(item);
              const why = synthWhy(item);
              return `
                <article class="item-card story-card">
                  <h5><a href="${esc(item.url || "#")}" target="_blank" rel="noopener">${esc(normalizedTitle)}</a></h5>
                  <p class="story-oneliner">${esc(oneLiner)}</p>
                  <p class="item-meta">${esc(source)}${date ? ` · ${esc(date)}` : ""}</p>
                  ${clipped ? `<p class="item-desc">${esc(clipped)}</p>` : ""}
                  <p class="item-why">${esc(why)}</p>
                </article>
              `;
            }).join("")
            : "<article class=\"item-card\"><p class=\"item-desc\">No stories available yet for this topic.</p></article>";

          return `
            <section class="sector-block">
              <div class="section-head">
                <h3>${esc(name)}</h3>
                <span class="section-meta">${esc(items.length)} stories</span>
              </div>
              <p class="sector-synth">${esc(sectorSummary)}</p>
              <div class="items-grid">${cards}</div>
            </section>
          `;
        }).join("");

        const execBrief = renderExecutiveBrief(filteredAllItems, lastUpdated);
        const controls = renderControls(counts);
        const bottomPanels = renderBottomPanels(lastUpdated, topSources, uniqueSources.size);

        root.innerHTML = `${execBrief}${summaryCard}${controls}${sectorsHtml}${bottomPanels}`;
      }

      async function loadData() {
        try {
          const response = await fetch("./data/latest.json", { cache: "no-store" });
          if (!response.ok) throw new Error("latest.json unavailable");
          return normalizePayload(await response.json());
        } catch {
          const fallbackResponse = await fetch("./news.json", { cache: "no-store" });
          if (!fallbackResponse.ok) throw new Error("news sources unavailable");
          return normalizePayload(await fallbackResponse.json());
        }
      }

      loadData().then(render).catch((error) => {
        const root = document.getElementById("app-root");
        root.innerHTML = `<section class="panel"><p class="error">Unable to load dashboard data: ${esc(error.message)}</p></section>`;
      });

      document.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (!target.classList.contains("filter-btn")) return;
        const selected = target.getAttribute("data-filter") || "all";
        if (!FILTERS.includes(selected) || selected === activeSourceFilter) return;

        activeSourceFilter = selected;
        if (cachedPayload) {
          render(cachedPayload);
          return;
        }
        loadData().then(render).catch((error) => {
          const root = document.getElementById("app-root");
          root.innerHTML = `<section class="panel"><p class="error">Unable to load dashboard data: ${esc(error.message)}</p></section>`;
        });
      });
    </script>
  </body>
</html>
