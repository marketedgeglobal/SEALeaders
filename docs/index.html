<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SEA Leaders | Coastal Insights</title>
    <style>
      :root {
        color-scheme: dark;
        --me-primary: #1fa6a3;
        --me-primary-strong: #167c88;
        --me-accent: #8fd3f4;
        --me-bg: #0f2233;
        --me-bg-2: #0b1e2d;
        --me-surface-top: #17354d;
        --me-surface-bottom: #122f45;
        --me-border: rgba(124, 200, 220, 0.2);
        --me-text: #f2f6f8;
        --me-muted: #9fb3c2;
        --me-radius: 14px;
        --me-shadow: 0 16px 36px rgba(0, 0, 0, 0.32);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: linear-gradient(180deg, var(--me-bg) 0%, var(--me-bg-2) 100%);
        color: var(--me-text);
        font-family: Inter, "Segoe UI", Calibri, Arial, Helvetica, sans-serif;
      }
      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px 18px 32px;
      }
      .page-head {
        border: 1px solid var(--me-border);
        border-radius: var(--me-radius);
        padding: 20px;
        background: linear-gradient(180deg, var(--me-surface-top) 0%, var(--me-surface-bottom) 100%);
        box-shadow: var(--me-shadow);
      }
      .eyebrow {
        color: var(--me-muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 8px 0 8px;
        font-size: clamp(1.5rem, 3vw, 2rem);
      }
      .subtitle {
        margin: 0;
        color: var(--me-muted);
      }
      #app-root {
        padding: 16px 0 28px;
        display: grid;
        gap: 18px;
      }
      .panel,
      .sector-block {
        border: 1px solid var(--me-border);
        border-radius: var(--me-radius);
        padding: 16px;
        background: linear-gradient(180deg, var(--me-surface-top) 0%, var(--me-surface-bottom) 100%);
        box-shadow: var(--me-shadow);
      }
      .panel h3,
      .sector-block h3 {
        margin: 0 0 8px;
        font-size: clamp(1.05rem, 2vw, 1.25rem);
      }
      .panel-sub {
        margin: 0;
        color: var(--me-muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }
      .top-row {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .filter-btn {
        border: 1px solid var(--me-border);
        background: rgba(46, 125, 175, 0.18);
        color: var(--me-accent);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .filter-btn.active {
        background: linear-gradient(180deg, var(--me-primary) 0%, var(--me-primary-strong) 100%);
        color: #fff;
      }
      .filter-select {
        min-width: 240px;
        border: 1px solid var(--me-border);
        background: rgba(46, 125, 175, 0.18);
        color: var(--me-accent);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 12px;
        font-weight: 600;
      }
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }
      .section-meta {
        color: var(--me-muted);
        font-size: 12px;
      }
      .pill {
        display: inline-block;
        border: 1px solid var(--me-border);
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(46, 125, 175, 0.22);
        font-size: 12px;
        color: var(--me-accent);
      }
      .metric-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .metric-card {
        border: 1px solid var(--me-border);
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(180deg, rgba(23, 53, 77, 0.96) 0%, rgba(18, 47, 69, 0.96) 100%);
      }
      .metric-label {
        font-size: 12px;
        color: var(--me-muted);
      }
      .metric-value {
        margin-top: 6px;
        font-weight: 700;
        font-size: 1.25rem;
      }
      .items-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .item-card {
        border: 1px solid var(--me-border);
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(180deg, rgba(23, 53, 77, 0.96) 0%, rgba(18, 47, 69, 0.96) 100%);
      }
      .item-card h5 {
        margin: 0;
        line-height: 1.3;
        font-size: 1rem;
      }
      .item-link {
        margin: 8px 0 0;
        font-size: 0.86rem;
      }
      .item-meta {
        margin: 8px 0 0;
        color: var(--me-muted);
        font-size: 12px;
      }
      .item-desc {
        margin: 10px 0 0;
        line-height: 1.45;
        color: var(--me-text);
      }
      a {
        color: var(--me-accent);
      }
      a:hover {
        color: #c8ebff;
      }
      .error {
        color: #fb7185;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="page-head">
        <div class="eyebrow">SEA Leaders · Coastal Intelligence</div>
        <h1>PartnerAI: Southeast Asia Coastal Insights</h1>
        <p class="subtitle">Sustainable Fisheries · Climate Change · Maritime Security · Sustainable Blue Economy · Marine Pollution</p>
      </section>
      <div id="app-root" class="sea-app">Loading intelligence dashboard…</div>
    </main>
    <script>
      const CATEGORY_ORDER = [
        "Sustainable Fisheries",
        "Climate Change",
        "Maritime Security",
        "Sustainable Blue Economy",
        "Marine Pollution",
      ];
      const COUNTRY_FILTERS = [
        { key: "all", label: "All Countries", patterns: [] },
        { key: "vietnam", label: "Vietnam", patterns: ["vietnam"] },
        { key: "thailand", label: "Thailand", patterns: ["thailand"] },
        { key: "philippines", label: "Philippines", patterns: ["philippines"] },
        { key: "indonesia", label: "Indonesia", patterns: ["indonesia"] },
        { key: "malaysia", label: "Malaysia", patterns: ["malaysia"] },
        { key: "myanmar", label: "Myanmar", patterns: ["myanmar"] },
        { key: "cambodia", label: "Cambodia", patterns: ["cambodia"] },
        { key: "singapore", label: "Singapore", patterns: ["singapore"] },
        { key: "brunei", label: "Brunei", patterns: ["brunei"] },
      ];
      let activeCountryFilter = "all";
      let cachedPayload = null;

      function esc(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => (
          { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char] || char
        ));
      }

      function normalizePayload(raw) {
        if (Array.isArray(raw.sectors)) {
          return {
            runAt: raw.runAt || raw.generated_at || "",
            sectors: raw.sectors.map((sector) => ({
              name: sector.name,
              items: Array.isArray(sector.items) ? sector.items : [],
            })),
          };
        }

        if (raw.by_category && typeof raw.by_category === "object") {
          const sectors = Object.entries(raw.by_category).map(([name, items]) => ({
            name,
            items: Array.isArray(items) ? items : [],
          }));
          return {
            runAt: raw.runAt || raw.generated_at || "",
            sectors,
          };
        }

        return { runAt: "", sectors: [] };
      }

      function formatDate(raw) {
        const value = String(raw || "").trim();
        if (!value) return "";
        const parsed = Date.parse(value);
        if (!Number.isFinite(parsed)) return value;
        return new Date(parsed).toLocaleString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function flattenItems(sectors) {
        return (sectors || []).flatMap((sector) =>
          (sector.items || []).map((item) => ({ ...item, sectorName: sector.name || "Unknown" }))
        );
      }

      function cleanPublisherLabel(raw) {
        const value = String(raw || "").replace(/\s+/g, " ").trim();
        if (!value) return "";
        return value.replace(/^Google\s+News\s*[:\-]?\s*/i, "").trim();
      }

      function splitTitlePublisher(rawTitle) {
        const value = String(rawTitle || "").replace(/\s+/g, " ").trim();
        if (!value) return { title: "", publisher: "" };
        const parts = value.split(/\s+-\s+/).map((part) => part.trim()).filter(Boolean);
        if (parts.length >= 2) {
          const candidate = cleanPublisherLabel(parts[parts.length - 1]);
          if (candidate && candidate.length <= 80) {
            return {
              title: parts.slice(0, -1).join(" - ").trim(),
              publisher: candidate,
            };
          }
        }
        return { title: value, publisher: "" };
      }

      function displaySource(item) {
        const publisher = cleanPublisherLabel(item.publisher || "");
        if (publisher) return publisher;

        const split = splitTitlePublisher(item.title || "");
        if (split.publisher) return split.publisher;

        const source = String(item.source || "").trim();
        if (/^google\s+news/i.test(source)) return "Google News";
        return source || "Unknown source";
      }

      function normalizeText(value) {
        return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "").trim();
      }

      function isNarrativeUseful(text, title, source) {
        const cleaned = String(text || "").replace(/\s+/g, " ").trim();
        if (!cleaned) return false;
        if (cleaned.length < 56 || cleaned.split(/\s+/).length < 9) return false;

        const normalizedSummary = normalizeText(cleaned);
        const normalizedTitle = normalizeText(title);
        const normalizedSource = normalizeText(source);
        if (!normalizedSummary) return false;
        if (normalizedSummary === normalizedTitle) return false;
        if (normalizedSummary === normalizedSource) return false;
        return true;
      }

      function buildCardSnippet(item) {
        const title = splitTitlePublisher(item.title || "").title || (item.title || "Untitled");
        const source = displaySource(item);
        const cleanedSnippet = String(item.snippet || "").replace(/\s+/g, " ").trim();
        if (!isNarrativeUseful(cleanedSnippet, title, source)) return "";
        const sentence = cleanedSnippet.split(/(?<=[.!?])\s+/)[0] || cleanedSnippet;
        return sentence.length > 240 ? sentence.slice(0, 239).trimEnd() + "…" : sentence;
      }

      function renderControls(counts) {
        const options = COUNTRY_FILTERS.map((country) => `
          <option value="${esc(country.key)}" ${activeCountryFilter === country.key ? "selected" : ""}>${esc(country.label)}</option>
        `).join("");

        return `
          <section class="top-row">
            <article class="panel">
              <h3>Topic Coverage</h3>
              <div class="pill-row">
                ${counts.map((row) => `<span class="pill">${esc(row.name)}: ${esc(row.count)}</span>`).join("")}
              </div>
            </article>
            <article class="panel">
              <h3>Display Controls</h3>
              <p class="panel-sub">Filter stories by country.</p>
              <div class="filter-row" aria-label="Country filter">
                <select id="country-filter" class="filter-select" aria-label="Country filter">
                  ${options}
                </select>
              </div>
            </article>
          </section>
        `;
      }

      function itemMatchesCountry(item, countryKey) {
        if (countryKey === "all") return true;
        const country = COUNTRY_FILTERS.find((entry) => entry.key === countryKey);
        if (!country) return true;
        const text = `${item.title || ""} ${item.snippet || ""} ${item.publisher || ""} ${item.source || ""} ${item.url || ""}`.toLowerCase();
        return country.patterns.some((pattern) => text.includes(pattern));
      }

      function filterItemsByCountry(items) {
        return (items || []).filter((item) => itemMatchesCountry(item, activeCountryFilter));
      }

      function render(data) {
        const root = document.getElementById("app-root");
        cachedPayload = data;
        const sectorsByName = Object.fromEntries((data.sectors || []).map((sector) => [sector.name, sector.items || []]));
        const allItems = flattenItems(data.sectors || []);
        const filteredAllItems = filterItemsByCountry(allItems);
        const counts = CATEGORY_ORDER.map((name) => {
          const filtered = filterItemsByCountry(sectorsByName[name] || []);
          return { name, count: filtered.length };
        });
        const totalStories = counts.reduce((sum, row) => sum + row.count, 0);
        const lastUpdated = formatDate(data.runAt);

        const summaryCard = `
          <section class="panel">
            <h3>Coverage Summary</h3>
            <div class="metric-grid">
              <div class="metric-card"><div class="metric-label">Total Stories</div><div class="metric-value">${esc(totalStories)}</div></div>
              <div class="metric-card"><div class="metric-label">Topics Covered</div><div class="metric-value">5</div></div>
              <div class="metric-card"><div class="metric-label">Last Refresh</div><div class="metric-value">${esc(lastUpdated || "Pending")}</div></div>
            </div>
          </section>
        `;

        const sectorsHtml = CATEGORY_ORDER.map((name) => {
          const items = filterItemsByCountry(sectorsByName[name] || []);
          const cards = items.length
            ? items.slice(0, 8).map((item) => {
              const normalizedTitle = splitTitlePublisher(item.title || "").title || (item.title || "Untitled");
              const articleUrl = item.verifiedUrl || item.url || "#";
              const date = formatDate(item.sourcePublishedAt || item.publishedAt || item.published || "");
              const clipped = buildCardSnippet(item);
              return `
                <article class="item-card story-card">
                  <h5><a href="${esc(articleUrl)}" target="_blank" rel="noopener">${esc(normalizedTitle)}</a></h5>
                  <p class="item-link"><a href="${esc(articleUrl)}" target="_blank" rel="noopener">Verified article URL</a></p>
                  <p class="item-meta">Source date: ${esc(date || "Unknown")}</p>
                  ${clipped ? `<p class="item-desc">${esc(clipped)}</p>` : ""}
                </article>
              `;
            }).join("")
            : "<article class=\"item-card\"><p class=\"item-desc\">No stories available yet for this topic.</p></article>";

          return `
            <section class="sector-block">
              <div class="section-head">
                <h3>${esc(name)}</h3>
                <span class="section-meta">${esc(items.length)} stories</span>
              </div>
              <div class="items-grid">${cards}</div>
            </section>
          `;
        }).join("");

        const controls = renderControls(counts);

        root.innerHTML = `${summaryCard}${controls}${sectorsHtml}`;
      }

      async function loadData() {
        try {
          const response = await fetch("./data/latest.json", { cache: "no-store" });
          if (!response.ok) throw new Error("latest.json unavailable");
          return normalizePayload(await response.json());
        } catch {
          const fallbackResponse = await fetch("./news.json", { cache: "no-store" });
          if (!fallbackResponse.ok) throw new Error("news sources unavailable");
          return normalizePayload(await fallbackResponse.json());
        }
      }

      loadData().then(render).catch((error) => {
        const root = document.getElementById("app-root");
        root.innerHTML = `<section class="panel"><p class="error">Unable to load dashboard data: ${esc(error.message)}</p></section>`;
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (!(target instanceof HTMLSelectElement)) return;
        if (target.id !== "country-filter") return;
        const selected = target.value || "all";
        const validKeys = COUNTRY_FILTERS.map((country) => country.key);
        if (!validKeys.includes(selected) || selected === activeCountryFilter) return;

        activeCountryFilter = selected;
        if (cachedPayload) {
          render(cachedPayload);
          return;
        }
        loadData().then(render).catch((error) => {
          const root = document.getElementById("app-root");
          root.innerHTML = `<section class="panel"><p class="error">Unable to load dashboard data: ${esc(error.message)}</p></section>`;
        });
      });
    </script>
  </body>
</html>
